<meta charset="UTF-8">

<title>坊市行情管理器</title>
<style>
:root{--p:#2575fc;--s:#6a11cb;--bg:#f4f7f6;--t:#333;--ok:#28a745;--warn:#ffc107;--err:#dc3545}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);margin:0;padding:12px;color:var(--t)}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:16px;margin:0 auto 14px;max-width:920px}
h1{margin:0 0 10px;font-size:20px;text-align:center;color:#fff;background:linear-gradient(135deg,var(--s),var(--p));padding:16px;border-radius:10px}
.upload-area{border:2px dashed #ccc;border-radius:12px;padding:30px;text-align:center;background:#fafafa;cursor:pointer;transition:.2s;margin-bottom:16px}
.upload-area:hover{border-color:var(--p);background:#f0f8ff}
.controls{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
select, button{padding:10px 16px;border-radius:8px;border:1px solid #ddd;font-size:14px;outline:none}
select{flex:1;min-width:150px;background:#fff;cursor:pointer}
button{background:linear-gradient(135deg,var(--s),var(--p));color:#fff;border:none;cursor:pointer;font-weight:600;transition:opacity .2s}
button:hover{opacity:.9}
button.secondary{background:#6c757d}
table{width:100%;border-collapse:collapse;margin-top:10px;background:#fff;border-radius:8px;overflow:hidden}
th,td{border-bottom:1px solid #eee;padding:12px;text-align:left;font-size:14px}
th{background:#f8f9fa;font-weight:600;color:#666}
tr:last-child td{border-bottom:none}
.price-up{color:var(--err);font-weight:600}
.price-down{color:var(--ok);font-weight:600}
.time{font-size:12px;color:#999}
#progressBox{display:none;margin-top:10px;padding:12px;background:#eef2f7;border-radius:8px}
.progress-bar{height:6px;background:#ddd;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;width:0;background:var(--p);transition:width .2s}
#statusText{font-size:13px;color:#666}
.empty-tip{text-align:center;padding:40px;color:#999;font-style:italic}
</style>
</head>
<body>

<div class="card">
    <h1>坊市行情查询</h1>

    <div style="margin:12px 0 6px;font-weight:600;color:#555">商品价格对比</div>
    <div class="controls">
        <label for="itemSearch">搜索：</label>
        <input id="itemSearch" type="text" placeholder="商品/拼音/首字母" style="flex:1;min-width:160px;padding:10px 16px;border-radius:8px;border:1px solid #ddd;font-size:14px;outline:none">
        <label for="itemSelect">选择商品：</label>
        <select id="itemSelect">
            <option value="">-- 请选择商品 --</option>
        </select>
    </div>
    <div id="compareContainer">
        <table id="compareTable">
            <thead>

                    <th>坊市</th>

                    <th>更新时间</th>
                </tr>

            <tbody id="compareBody"></tbody>

    </div>

    <div class="controls">

            <option value="逐鹿坊市">逐鹿坊市</option>
            <option value="白土坊市">白土坊市</option>

    </div>

    <div id="tableContainer">

                <tr>

                    <th>卖出价格</th>
                    <th>更新时间</th>
                </tr>
            </thead>
            <tbody id="priceBody">
                <!-- 数据行 -->

        </table>
    </div>
</div>

const marketSelect = document.getElementById('marketSelect');

const itemSearch = document.getElementById('itemSearch');
const priceBody = document.getElementById('priceBody');
const compareBody = document.getElementById('compareBody');

const pinyinKeys = {
    "戈居坊市": "gejufangshi gjfs",
    "肤施坊市": "fushifangshi fsfs",
    "虎威坊市": "huweifangshi hwfs",
    "天水坊市": "tianshuifangshi tsfs",
    "大城坊市": "dachengfangshi dcfs",
    "逐鹿坊市": "zhulufangshi zlfs",
    "白土坊市": "baitufangshi btfs",
    "谷物": "guwu gw",
    "黏土": "niantu nt",
    "葡萄": "putao pt",
    "铁矿石": "tiekuangshi tks",
    "铜矿石": "tongkuangshi tks",
    "硬木": "yingmu ym",
    "棉花": "mianhua mh",
    "茶叶": "chaye cy",
    "药材": "yaocai yc",
    "香料": "xiangliao xl",
    "毛皮": "maopi mp",
    "蜂蜜": "fengmi fm",
    "盐": "yan y",
    "米酒": "mijiu mj",
    "陶器": "taoqi tq",
    "葡萄酒": "putaojiu ptj",
    "兵器": "bingqi bq",
    "铜器": "tongqi tq",
    "工具": "gongju gj",
    "布帛": "bubo bb"
};

function norm(s) {
    return String(s || '').toLowerCase().replace(/\s+/g, '');
}

function matchesQuery(label, query) {
    const q = norm(query);
    if (!q) return true;
    const key = norm(label + ' ' + (pinyinKeys[label] || ''));
    return key.includes(q);
}

function renderTable() {
    const market = marketSelect.value;
    priceBody.innerHTML = '';
    
    if (!market || !marketData[market]) return;
    
    const items = marketData[market];
    Object.keys(items).sort().forEach(name => {
        const data = items[name];
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${name}</td>
            <td class="price-up">${data.price}</td>
            <td class="time">${data.time}</td>
        `;
        priceBody.appendChild(tr);
    });
}

function updateItemDropdown() {
    const currentItem = itemSelect.value;
    const query = itemSearch.value;
    const itemsSet = new Set();
    Object.keys(marketData).forEach(market => {
        const items = marketData[market];
        Object.keys(items).forEach(name => itemsSet.add(name));
    });

    itemSelect.innerHTML = '<option value="">-- 请选择商品 --</option>';
    [...itemsSet].sort().filter(name => matchesQuery(name, query)).forEach(name => {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        itemSelect.appendChild(option);
    });

    if (currentItem && itemsSet.has(currentItem)) {
        itemSelect.value = currentItem;
    }
}

function renderCompare() {
    const itemName = itemSelect.value;
    compareBody.innerHTML = '';
    if (!itemName) return;

    const rows = [];
    Object.keys(marketData).forEach(market => {
        const item = marketData[market]?.[itemName];
        if (item && typeof item.price !== 'undefined') {
            rows.push({ market, price: item.price, time: item.time || '' });
        }
    });

    rows.sort((a, b) => (a.price ?? 0) - (b.price ?? 0));
    rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${r.market}</td>
            <td class="price-up">${r.price}</td>
            <td class="time">${r.time}</td>
        `;
        compareBody.appendChild(tr);
    });
}

function updateDropdown() {
    const currentMarket = marketSelect.value;
    const query = marketSearch.value;
    marketSelect.innerHTML = '';
    Object.keys(marketData).sort().filter(market => matchesQuery(market, query)).forEach(market => {
        const option = document.createElement('option');
        option.value = market;
        option.textContent = market;
        marketSelect.appendChild(option);
    });
    if (currentMarket && [...marketSelect.options].some(o => o.value === currentMarket)) {
        marketSelect.value = currentMarket;
    } else if (marketSelect.options.length) {
        marketSelect.selectedIndex = 0;
    }
}

// 监听切换
marketSelect.onchange = renderTable;
itemSelect.onchange = renderCompare;
marketSearch.oninput = () => {
    updateDropdown();
    renderTable();
};
itemSearch.oninput = () => {
    updateItemDropdown();
    renderCompare();
};

// 初始加载
updateDropdown();
updateItemDropdown();
renderTable();
renderCompare();
